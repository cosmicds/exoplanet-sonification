name: Update Exoplanet Data

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 6am UTC
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python: regenerate src/exoplanetData.ts ──────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements_data.txt

      - name: Fetch NASA data and regenerate exoplanetData.ts
        run: python generate_exoplanet_data.py

      # ── Commit updated data file (no-op if nothing changed) ──────────────
      - uses: stefanzweifel/git-auto-commit-action@v5
        id: commit
        with:
          commit_message: "chore: update exoplanet data from NASA archive"
          file_pattern: src/exoplanetData.ts

      # ── Build (only runs if the data file actually changed) ──────────────
      - uses: actions/setup-node@v4
        if: steps.commit.outputs.changes_detected == 'true'
        with:
          node-version: '20'

      - name: Install JS deps
        if: steps.commit.outputs.changes_detected == 'true'
        run: yarn install --frozen-lockfile

      - name: Build
        if: steps.commit.outputs.changes_detected == 'true'
        run: npm run build

      # ── Deploy dist/ to self-hosted server via SCP ───────────────────────
      # Requires GitHub secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY, DEPLOY_PATH
      - name: Deploy to server
        if: steps.commit.outputs.changes_detected == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "dist/"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

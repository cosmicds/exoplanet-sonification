name: Update Exoplanet Data

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 6am UTC
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python: regenerate src/exoplanetData.ts ──────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements_data.txt

      - name: Fetch NASA data and regenerate exoplanetData.ts
        run: python generate_exoplanet_data.py

      # ── Commit updated data file (no-op if nothing changed) ──────────────
      - uses: stefanzweifel/git-auto-commit-action@v5
        id: commit
        with:
          commit_message: "chore: update exoplanet data from NASA archive"
          file_pattern: src/exoplanetData.ts
